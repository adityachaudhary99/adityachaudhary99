name: README build

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"   # daily 04:00 UTC — refresh live stats
  workflow_dispatch: {}    # allow manual runs

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh stats in the SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: adityachaudhary99
        run: python stats.py

      - name: Commit updated SVGs
        run: |-
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git commit -m "chore: refresh profile stats" || echo "No changes to commit"
          git push
